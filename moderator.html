<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PGG Moderator">
<title>PGG Moderator App</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ===================== BASE ===================== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", Roboto, sans-serif;
  background: #000;
  color: #fff;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  height: 100%;
}
#app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

/* ===================== HEADER ===================== */
.header {
  display: flex; align-items: center;
  padding: 16px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  font-size: 20px; font-weight: 600;
  gap: 10px;
}
.header .home-btn {
  background: transparent; border: none; color: inherit;
  font-size: 22px; padding: 4px 8px; cursor: pointer;
}
.header .title { flex: 1; }

/* ===================== CONTENT ===================== */
.content { flex: 1; padding: 16px; display: flex; flex-direction: column; }
.content.center { justify-content: center; align-items: center; text-align: center; }

h2 { font-size: 22px; margin: 8px 0 12px; font-weight: 600; }
p, label { font-size: 17px; line-height: 1.45; }
.big-msg { font-size: 21px; line-height: 1.55; margin: 12px 0; }
.script-text { font-size: 21px; line-height: 1.6; text-align: center; margin: auto 0; }

/* ===================== BUTTONS ===================== */
.btn {
  display: block; width: 100%;
  padding: 18px 16px;
  margin: 8px 0;
  font-size: 19px;
  font-weight: 600;
  background: rgba(255,255,255,0.22);
  color: #fff;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  text-align: center;
}
.btn:active { background: rgba(255,255,255,0.35); }
.btn.primary { background: rgba(255,255,255,0.32); }
.btn.outline { background: transparent; border: 1.5px solid rgba(255,255,255,0.6); }
.btn:disabled { opacity: 0.4; }
.btn-row { display: flex; gap: 12px; }
.btn-row .btn { flex: 1; }

/* ===================== INPUTS ===================== */
.field { margin: 14px 0; }
.field label { display: block; margin-bottom: 6px; font-size: 15px; opacity: 0.9; }
.field input, .field select, .field textarea {
  width: 100%;
  padding: 14px;
  font-size: 17px;
  background: transparent;
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 18px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.field input { text-align: center; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #fff; }
.field select option { color: #000; }
textarea { font-family: inherit; resize: vertical; min-height: 90px; }

/* ===================== COLOUR PICKER ===================== */
.colour-row { display: flex; justify-content: space-between; margin: 16px 4px; }
.colour-dot {
  width: 44px; height: 44px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent; transition: transform 0.1s;
}
.colour-dot.selected { border-color: #fff; transform: scale(1.1); }

/* ===================== CLOCK / TIMER ===================== */
.clock-wrap { display:flex; flex-direction:column; align-items:center; margin: 8px 0 4px; }
.clock {
  width: 150px; height: 150px; border-radius: 50%;
  border: 6px solid #fff; position: relative; margin-bottom: 8px;
}
.clock::before, .clock::after {
  content:""; position:absolute; left:50%; top:50%;
  background:#fff; transform-origin: bottom center; border-radius: 4px;
}
.clock::before { width:5px; height:38px; transform: translate(-50%,-100%) rotate(0deg); }
.clock::after  { width:5px; height:52px; transform: translate(-50%,-100%) rotate(120deg); }
.timer-num {
  font-size: 56px; font-weight: 700; text-align:center;
  background: rgba(255,255,255,0.22); border-radius: 999px;
  padding: 10px 0; margin: 10px 0;
}
.timer-num.ringing { animation: flash 0.6s steps(2) infinite; }
@keyframes flash { 0%{background:rgba(255,255,255,0.22);} 100%{background:rgba(255,90,90,0.55);} }
.timer-label { text-align:center; opacity:0.9; font-size:16px; margin-bottom:6px; }

/* ===================== VILLAGE-FUND CALC LIST ===================== */
.vf-list { margin: 8px 0; }
.vf-item {
  display:flex; align-items:center; gap:12px;
  padding: 12px 6px; border-bottom: 1px solid rgba(255,255,255,0.12);
  font-size: 22px;
}
.vf-dot { width:34px; height:34px; border-radius:50%; flex:0 0 auto; }
.vf-name { flex:1; }
.vf-val {
  min-width: 64px; text-align:center; font-weight:700;
  border: 1.5px solid rgba(255,255,255,0.5); border-radius: 12px; padding: 6px 4px;
  cursor:pointer; font-size:20px;
}
.vf-val.empty { opacity:0.5; }
.vf-foot { margin-top:12px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.3); text-align:center; font-size:17px; }
.vf-foot .big { font-size:30px; font-weight:700; }

/* numeric keypad for VF entry */
.keypad-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display:flex; flex-direction:column; justify-content:flex-end; z-index: 2000;
}
.keypad-sheet { background:#111; border-radius:20px 20px 0 0; padding:16px; }
.keypad-display {
  font-size:44px; font-weight:700; text-align:center; margin:8px 0 14px;
  background:rgba(255,255,255,0.18); border-radius:14px; padding:10px 0;
}
.keypad-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.keypad-grid button {
  padding:18px 0; font-size:24px; font-weight:600;
  background:rgba(255,255,255,0.2); color:#fff; border:none; border-radius:12px;
}
.keypad-grid button:active { background:rgba(255,255,255,0.4); }

/* ===================== CHECKLIST (Material) ===================== */
.check-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 8px; border-bottom:1px solid rgba(255,255,255,0.12);
  font-size:17px; cursor:pointer;
}
.check-item.sub { padding-left:28px; font-size:15px; opacity:0.95; }
.check-box {
  width:26px; height:26px; flex:0 0 auto; border:2px solid #fff;
  border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:18px;
}
.check-box.checked { background:#fff; color:#000; }
.page-indicator { text-align:center; opacity:0.8; font-size:14px; margin:6px 0; }

/* ===================== TABLES ===================== */
.table-wrap { overflow:auto; max-height:60vh; background:rgba(255,255,255,0.95);
  border-radius:12px; margin:12px 0; -webkit-overflow-scrolling:touch; }
table.grid { border-collapse:collapse; color:#222; font-size:13px; min-width:100%; }
table.grid th, table.grid td { border:1px solid #ddd; padding:8px 6px; text-align:center; min-width:54px; background:#fff; }
table.grid th { background:#e8eef7; font-weight:600; position:sticky; top:0; z-index:2; }
table.grid td:first-child, table.grid th:first-child { position:sticky; left:0; background:#e8eef7; font-weight:600; z-index:1; }
table.grid tr:last-child td { background:#f0f4fb; font-weight:600; }
.scroll-hint { text-align:center; opacity:0.85; font-size:13px; margin:4px 0; }

/* editable table (cash / others) */
table.edit { width:100%; border-collapse:collapse; margin:10px 0; }
table.edit th, table.edit td { border:1px solid rgba(255,255,255,0.3); padding:6px; font-size:14px; }
table.edit th { background:rgba(255,255,255,0.12); }
table.edit input { width:100%; background:transparent; border:none; color:#fff; text-align:center; font-size:15px; padding:8px 2px; outline:none; }
table.edit input:focus { background:rgba(255,255,255,0.12); border-radius:6px; }

/* ===================== LIST CARDS ===================== */
.list-card {
  background: rgba(255,255,255,0.22); border-radius:16px; padding:18px 16px; margin:10px 0;
  font-size:18px; font-weight:500; display:flex; align-items:center; gap:12px; cursor:pointer;
}
.list-card .ic { font-size:22px; }

/* ===================== UTILITY ===================== */
.spacer { flex:1; }
.muted { opacity:0.85; }
hr.divider { border:none; border-top:1px solid rgba(255,255,255,0.4); margin:16px 0; }
.note-flag { background:rgba(255,255,255,0.12); border-radius:12px; padding:12px; font-size:14px; margin:10px 0; }
.toast {
  position:fixed; bottom:20px; left:20px; right:20px; background:rgba(0,0,0,0.9);
  color:#fff; padding:14px; border-radius:12px; text-align:center; font-size:15px; z-index:3000;
}
.seg-timer { text-align:center; font-size:18px; margin:14px 0; }
.seg-timer .big { font-size:40px; font-weight:700; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius:3px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =============================================================================
   PGG MODERATOR APP — single-file offline PWA
   Mirrors the hardened Facilitator app: localStorage persistence, locked
   auto-flow, hardware-back blocking, beforeunload guard, resume-safe state.
   Drives the moderator's scripted slideshow over the full 40 rounds
   (2 sessions x 2 blocks x 10 rounds) plus Issue logging, Chief tracking,
   Village-Fund accounting, History, End-Experiment checklist, and CSV export.
============================================================================= */

/* ---------- CONSTANTS ---------- */
const TOKENS_PER_ZAR = 4;          // 4 tokens = 1 ZAR
const VF_RATE = 0.10;              // village fund = 10% of total room payoff
const N_GROUPS = 6;
const GROUP_ENDOWMENT = 40;        // 4 members x 10 tokens (reference only)
const COLOURS = {                  // hex for the 6 group dots
  Red:'#E8514D', Yellow:'#F2C53D', Blue:'#3E86D6',
  Green:'#5FAE4E', Orange:'#E8872E', Purple:'#9B59C8'
};
// fixed colour order used everywhere: VF-calc screen, history table, CSVs
const VF_ORDER = ['Red','Orange','Yellow','Green','Blue','Purple'];
const HIST_ORDER = ['Red','Orange','Yellow','Green','Blue','Purple'];
// group colour -> 2-digit code (for participant IDs: code_member, e.g. Red 01 -> 01_01)
const COLOUR_CODE = { Red:'01', Orange:'02', Yellow:'03', Green:'04', Blue:'05', Purple:'06' };

/* ---------- STORAGE ---------- */
const LS_KEY = 'pgg_moderator_state_v1';
function makeFreshState() {
  return {
    setup: null,            // {villageNumber, villageName, moderatorName, date, villageType, chiefName}
    started: false,
    finished: false,
    stepIndex: 0,           // pointer into the generated script
    roundStartTs: null,     // ms — set when the current round's countdown begins (for chief offsets)
    // timer resume support (so opening Issue mid-countdown is non-destructive)
    timerStepIndex: null,
    timerRemaining: null,
    timerEndTs: null,       // absolute ms when current timer hits 0 (null = paused/none)
    // village fund: vf[session][round] = { byColour:{Red:Number,...}, total, vf }
    vf: { 1:{}, 2:{} },
    // session metadata for CSV summary
    sessionMeta: { 1:{startTs:null,endTs:null}, 2:{startTs:null,endTs:null} },
    // logs
    events: [],             // {type:'issue'|'left', session, round, note/id, ts, duration_sec}
    chiefSegments: [],      // {session, round, segment_no, target, start_sec_from_round_start, start_ts, end_ts, duration_sec, quick_note}
    // end-experiment data
    material: {},           // id -> bool
    receipt: { sumReceipts:'', offlineTotal:'', vfTokens:'', vfZar:'' },
    cash: {
      denoms: [
        {label:'Notes — denom 1', kind:'notes', face:'', brought:'', remain:''},
        {label:'Notes — denom 2', kind:'notes', face:'', brought:'', remain:''},
        {label:'Notes — denom 3', kind:'notes', face:'', brought:'', remain:''},
        {label:'Coins — denom 1', kind:'coins', face:'', brought:'', remain:''},
        {label:'Coins — denom 2', kind:'coins', face:'', brought:'', remain:''}
      ],
      starting:'', paidOut:'', remaining:''
    },
    others: [ {item:'', qty:''}, {item:'', qty:''}, {item:'', qty:''} ],
    seedsPurchased: '',
    sessionNotes: ''
  };
}
function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) {
      const p = JSON.parse(s);
      const f = makeFreshState();
      // shallow backfill of any new top-level keys
      for (const k in f) if (!(k in p)) p[k] = f[k];
      if (!p.vf) p.vf = {1:{},2:{}};
      if (!p.sessionMeta) p.sessionMeta = f.sessionMeta;
      return p;
    }
  } catch (e) {}
  return null;
}
function saveState(){ try { localStorage.setItem(LS_KEY, JSON.stringify(STATE)); } catch(e){} }
function resetState(){ localStorage.removeItem(LS_KEY); STATE = makeFreshState(); }
let STATE = loadState() || makeFreshState();

/* =============================================================================
   SCRIPT BUILDER
   Produces the full ordered list of steps. Pure function of setup — rebuilt on
   every load; only stepIndex is persisted. Each step:
     { kind, session, block, round, title, text, timerSec, timerLabel,
       beginRound, startsCountdown, isFinalVF }
============================================================================= */
function silentTimerSec(localRound){ return localRound <= 5 ? 60 : 30; }   // R1-5: 60s, R6-10: 30s
function discussionMin(round){                                            // comm rounds 11-20
  if (round >= 11 && round <= 13) return 5;
  if (round >= 14 && round <= 16) return 3;
  return 2;                                                               // 17-20
}

function buildScript() {
  const S = []; const setup = STATE.setup || {};
  const modName = setup.moderatorName || '[Moderator name]';
  const chief = setup.chiefName ? setup.chiefName : '[the chief / iNkosi / induna of this village, by name]';
  const txt = (session, block, round, title, text, extra={}) =>
    S.push(Object.assign({ kind:'text', session, block, round, title, text }, extra));
  const timer = (session, block, round, sec, label) =>
    S.push({ kind:'timer', session, block, round, timerSec:sec, timerLabel:label, title:'Experiment' });
  const vfcalc = (session, round) =>
    S.push({ kind:'vfcalc', session, block:(round<=10?'A':'B'), round, title:`Session ${session}. Round ${round}` });
  const vfann = (session, round) =>
    S.push({ kind:'vfannounce', session, block:(round<=10?'A':'B'), round, title:`Session ${session}. Round ${round}` });

  /* ---------- 1.x  INTRO (read once, before Session 1) ---------- */
  const T = 'Experiment Instruction';
  txt(1,'A',null,T,`My name is ${modName}, and I work with a research team from Taiwanese Academia Sinica and Nelson Mandela University. The other people you see here are my colleagues — six who are seated at each of your group tables, and one who registered you at the entrance.`);
  txt(1,'A',null,T,`We are here to learn about how communities in this area make decisions together. We are not from the government, and we are not from any party or NGO that gives benefits.`);
  txt(1,'A',null,T,`Before I begin explaining the process, please kindly turn off your mobile phone. We will have short breaks between sessions. You may use your phone during the breaks, but please do not discuss the experiment with anyone inside or outside the room.`);
  txt(1,'A',null,T,`Today's session will take approximately 2 and a half to 3 hours. There are two parts. In the first part, you will play a decision-making activity in small groups. The second part is a short questionnaire, conducted one-on-one.`);
  txt(1,'A',null,T,`For taking part today, each of you will receive a show-up fee of ZAR 30 for being here, plus an additional amount of money based on the choices you and others make in the activity.`);
  txt(1,'A',null,T,`Payment is in cash, in private, at the end of the session. We will explain how the money is earned in a few minutes. Before I hand out the consent forms, I want to flag one thing.`);
  txt(1,'A',null,T,`In some parts of today's session, your group is allowed to talk together before making a decision. When that happens, we may audio-record the group's discussion. This is only for our research analysis — to write down what people said and look at patterns of language.`);
  txt(1,'A',null,T,`The recordings will not be shared with anyone outside our research team. We will not share them with the chief, with the municipality, with employers, or with anyone in your community. In front of you is a consent form. Please make sure that the ID printed in the top-right corner of the paper matches your assigned ID.`);
  txt(1,'A',null,T,`Please raise your hand at any point if you have a question. Please now tick the boxes you agree with, sign at the bottom, and pass the form to the facilitator who handed it to you.`);
  txt(1,'A',null,T,`We are going to play several cooperation games. In each round, every participant will receive 10 tokens. You will decide privately how many of those 10 tokens to put into the group account, and how many to keep in your private account.`);
  txt(1,'A',null,T,`We will play the game using an app. A facilitator will come to you and ask you to enter your decision. You may enter any whole number between 0 and 10 for the amount you would like to contribute to the group account.`);
  txt(1,'A',null,T,`No one except the facilitator will know your decision. Here is the rule. There are two parts.`);
  txt(1,'A',null,T,`Part 1 — Private account: every token you keep in your private account is yours. If you keep 5 tokens private, you earn 5 tokens.`);
  txt(1,'A',null,T,`Part 2 — Group account: whatever the four of you put into the group account is added together. We then multiply it by 2, and split the multiplied amount equally among all four people in the group.`);
  txt(1,'A',null,T,`Thus, each token you contribute to the group account will earn 0.5 tokens for each of the four people in your group.`);
  txt(1,'A',null,T,`This means that for every token you contribute, you personally receive 0.5 tokens back, while each of the other three group members also receives 0.5 tokens. You will also benefit from the contributions made by the other members of your group. [Pause. If anyone looks confused, repeat with the worked example below.]`);
  txt(1,'A',null,T,`Let me give you an example. Suppose each person starts with 10 tokens this round. Suppose you decide to put 4 tokens into the group account, and keep 6 tokens in your private account.`);
  txt(1,'A',null,T,`Now suppose, after we collect all four people's contributions, the total your group put into the group account adds up to 14 tokens. We multiply by 2: that is 28 tokens. We split this equally by 4: each person gets 7 tokens from the group account. So your earnings for this round are: 6 tokens you kept private, plus 7 from the group account, equals 13 tokens.`);
  txt(1,'A',null,T,`This is just an example. The decisions in the actual game are up to you, and the group total depends on what everyone in your group decides — which we won't know until after we collect everyone's contributions. Are there any questions before we go on? Please raise your hand.`);
  txt(1,'A',null,T,`After every round, your group facilitator will calculate the total amount in the group account and announce it to the group. The facilitator will then come to each of you individually to inform you of your personal earnings in private. You will have a Self-Record Table in front of you. [Please hand out the Self-Record Table.]`);
  txt(1,'A',null,T,`First, please make sure that the ID printed in the top-right corner of the sheet matches your assigned ID. There are six columns: A = your own contribution, B = your own private kept, C = the group total, D = C multiplied by 2, E = D divided by 4 (your share back), F = B plus E (your profit this round). [Pause. If anyone looks confused, repeat with the worked example below.]`);
  txt(1,'A',null,T,`This is so you can verify the calculation yourself. You will only hear your own group's total and your own earnings. You will not hear what each individual member of your group put in, and you will not hear other groups' totals. Please keep this sheet confidential. Do not share any information with others or look at other participants' sheets.`);
  txt(1,'A',null,T,`All the tokens you earn across the 20 rounds will be added up at the end and converted to Rand. The exchange rate is 4 tokens = 1 ZAR, and this is fixed and announced now. You will be paid in cash, in private, at the end of the session.`);
  txt(1,'A',null,T,`There is also one more rule, called the village fund. After every round, we add up the total earnings of all 24 people in this room. We then set aside 10% of that total for the village fund.`);
  txt(1,'A',null,T,`The village fund is not paid to anyone in this room. It is used to buy agricultural seeds for the village — something that benefits the whole community. This rule is the same throughout today's session. After every round, I will announce to the whole room what the village fund has grown to, and roughly how many seeds it can buy so far.`);

  /* ---------- helper: a silent block (rounds 1-10) ---------- */
  function silentBlock(session, introScreens) {
    const head = `Session ${session} Round`;
    // block entry banner
    txt(session,'A',1,'Experiment Instruction',`[Enter Experiment — Session ${session}, Rounds 1–10 (silent)]`);
    introScreens(); // block-specific instruction screens, once
    for (let r=1; r<=10; r++) {
      txt(session,'A',r,`${head} ${r}`,`We will now begin Round ${r}.`,{beginRound:true,startsCountdown:true});
      timer(session,'A',r, silentTimerSec(r), `Round ${r} · decision time`);
      txt(session,'A',r,`${head} ${r}`,`Decision time is up. Facilitator will come to you one on one.`);
      vfcalc(session,r);
      vfann(session,r);
    }
  }
  /* ---------- helper: a communication block (rounds 11-20) ---------- */
  function commBlock(session, introScreens, chiefSpeaks) {
    const head = `Session ${session} Round`;
    txt(session,'B',11,'Experiment Instruction',`[Enter Experiment — Session ${session}, Rounds 11–20 (discussion)]`);
    introScreens();
    for (let r=11; r<=20; r++) {
      const Tmin = discussionMin(r);
      // per-round discussion reminder
      let perRound = `Your group may discuss with each other before deciding. You have ${Tmin} minutes for discussion this round. Remember: each person's contribution decision is private and final, and you cannot promise gifts or side payments.`;
      if (chiefSpeaks) perRound = `For this round the chief will speak to the room first, then your group discusses. Total discussion time this round is ${Tmin} minutes. Remember: each person's contribution decision is private and final, and you cannot promise gifts or side payments.`;
      txt(session,'B',r,`${head} ${r}`, perRound);
      txt(session,'B',r,`${head} ${r}`,`We will now begin Round ${r}.`,{beginRound:true,startsCountdown:true});
      timer(session,'B',r, Tmin*60, `Round ${r} · discussion (${Tmin} min)`);
      txt(session,'B',r,`${head} ${r}`,`Discussion time is up. Please stop discussing now and prepare your contributions. You will have 30 seconds to make your decision.`,{startsCountdown:true});
      timer(session,'B',r, 30, `Round ${r} · decision (30 sec)`);
      txt(session,'B',r,`${head} ${r}`,`Decision time is up. Facilitator will come to you one on one.`);
      vfcalc(session,r);
      if (session===2 && r===20) {
        // last round of the whole experiment: skip normal announce, show final total
        S.push({ kind:'finalvf', session:2, block:'B', round:20, title:'Total Village Fund' });
      } else {
        vfann(session,r);
      }
    }
  }
  /* ---------- helper: a break sequence ---------- */
  function breakSeq(session, block, msg) {
    txt(session,block,null,`Session ${session}`, msg, {startsCountdown:true});
    timer(session,block,null, 4*60, 'Break · 4 minutes');
    txt(session,block,null,`Session ${session}`,`One minute until we resume. Please return to your seats.`,{startsCountdown:true});
    timer(session,block,null, 60, 'Break · final minute');
    txt(session,block,null,`Session ${session}`,`Break time is over. Please return to your seats.`);
  }

  /* ---------- SESSION 1 (no chief) ---------- */
  silentBlock(1, () => {
    txt(1,'A',1,'Session 1 Round 1',`The first part of today's session includes 10 silent games, please do not talk to anyone during the activity — not the people in your group, not other groups, and not the experimenters except to ask a quick clarifying question.`);
    txt(1,'A',1,'Session 1 Round 1',`Decisions are made silently. If something is unclear, please raise your hand and one of us will come over. Remember, in each round you will have 10 tokens to allocate.`);
    txt(1,'A',1,'Session 1 Round 1',`For the first five rounds, you will have one minute to make your decision. For the rest of the rounds, you will have 30 seconds. After each round, the facilitator will come to you to record your choice.`);
  });

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg, ms=1900){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms); }

}

/* ---------- AUDIO ALARM (offline, no asset) ---------- */
let AC=null, alarmTimers=[];
function ensureAC(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC && AC.state==='suspended') AC.resume(); }
function beepOnce(){ if(!AC) return; const o=AC.createOscillator(), g=AC.createGain(); o.type='square'; o.frequency.value=880; g.gain.value=0.0001; o.connect(g); g.connect(AC.destination); const t=AC.currentTime; g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.35); o.start(t); o.stop(t+0.36); }
function startAlarm(){ stopAlarm(); ensureAC(); if(navigator.vibrate) navigator.vibrate([400,200,400,200,400]); for(let i=0;i<20;i++){ alarmTimers.push(setTimeout(beepOnce, i*500)); } }
function stopAlarm(){ alarmTimers.forEach(clearTimeout); alarmTimers=[]; if(navigator.vibrate) navigator.vibrate(0); }

/* ---------- TIMER STEP (mock page 8) ----------
   Wall-clock based: a timer started for the current step keeps running even if
   the moderator opens the Issue page (the countdown does NOT pause). A global
   background ticker rings the alarm if the timer expires while the moderator is
   away; auto-advance only happens while the timer screen is in view. */
let activeTimer=null;          // foreground display updater (timer screen only)
let alarmedStep=null;          // stepIndex that has already rung, to avoid repeats
function stopActiveTimer(){ if(activeTimer){ clearInterval(activeTimer); activeTimer=null; } }
function timerRemainingNow(){
  if(STATE.timerEndTs!=null) return Math.max(0, Math.round((STATE.timerEndTs-Date.now())/1000));
  return STATE.timerRemaining!=null ? STATE.timerRemaining : 0;   // paused
}
function renderTimerStep(app, st){
  stopAlarm();
  // (re)start or resume the wall clock for this step
  if(STATE.timerStepIndex!==STATE.stepIndex){
    // fresh timer for this step
    STATE.timerStepIndex=STATE.stepIndex;
    STATE.timerRemaining=st.timerSec;
    STATE.timerEndTs=Date.now()+st.timerSec*1000;
    alarmedStep=null;
    saveState();
  } else if(STATE.timerEndTs==null && STATE.timerRemaining!=null && STATE.timerRemaining>0){
    // returning to a paused timer — stay paused until Resume
  } else if(STATE.timerEndTs==null && (STATE.timerRemaining==null)){
    STATE.timerRemaining=st.timerSec; STATE.timerEndTs=Date.now()+st.timerSec*1000; saveState();
  }
  let paused = (STATE.timerEndTs==null);
  let ringing=false;

  app.innerHTML = `
    <div class="header"><span class="title">Experiment</span></div>
    <div class="content center">
      <div class="timer-label">${escapeHtml(st.timerLabel||'')}</div>
      <div class="clock-wrap"><div class="clock"></div></div>
      <div class="timer-num" id="tnum">${fmtMMSS(timerRemainingNow())} left</div>
      <div class="btn-row" style="width:100%;">
        <button class="btn" id="t-pause">${paused?'Resume':'Pause'}</button>
        <button class="btn" id="t-skip">Skip →</button>
      </div>
      <button class="btn" id="s-issue" style="width:100%;">Issue</button>
    </div>`;
  const numEl=document.getElementById('tnum');
  const pauseBtn=document.getElementById('t-pause');
  ensureAC();

  const myStep=STATE.stepIndex;
  function finishTimer(){
    if(STATE.timerStepIndex==null) return;            // already finished — ignore stale calls
    stopActiveTimer(); stopAlarm();
    STATE.timerStepIndex=null; STATE.timerRemaining=null; STATE.timerEndTs=null; alarmedStep=null;
    saveState(); nextStep();
  }
  function onTimeUp(){
    if(ringing) return;
    ringing=true; numEl.classList.add('ringing'); numEl.textContent="Time's up";
    startAlarm(); alarmedStep=STATE.stepIndex;
    // auto-advance ~10s later, but only if still viewing this timer step
    setTimeout(()=>{ if(route==='step' && STATE.stepIndex===myStep && STATE.timerStepIndex!=null){ stopAlarm(); finishTimer(); } }, 10000);
  }
  function tick(){
    const rem=timerRemainingNow();
    numEl.textContent = rem>0 ? `${fmtMMSS(rem)} left` : "Time's up";
    if(rem<=0 && !paused) onTimeUp();
  }
  stopActiveTimer();
  activeTimer=setInterval(tick,500);
  if(timerRemainingNow()<=0 && !paused) onTimeUp();

  pauseBtn.onclick=()=>{
    if(STATE.timerEndTs!=null){ // -> pause
      STATE.timerRemaining=timerRemainingNow(); STATE.timerEndTs=null; paused=true; pauseBtn.textContent='Resume';
    } else { // -> resume
      STATE.timerEndTs=Date.now()+ (STATE.timerRemaining||0)*1000; paused=false; pauseBtn.textContent='Pause';
    }
    saveState();
  };
  document.getElementById('t-skip').onclick=()=>{ finishTimer(); };
  // opening Issue does NOT stop the wall clock; it keeps counting in the background
  document.getElementById('s-issue').onclick=()=>{ go('issueMenu'); };
}
/* background ticker: rings the alarm if a running timer expires while the
   moderator is on another screen (e.g. logging an Issue). */
setInterval(()=>{
  if(STATE.timerEndTs!=null && route!=='step'){
    const rem=Math.round((STATE.timerEndTs-Date.now())/1000);
    if(rem<=0 && alarmedStep!==STATE.timerStepIndex){ alarmedStep=STATE.timerStepIndex; startAlarm(); }
  }
},700);

    </div>`;
  document.getElementById('back').onclick=()=>{ if(confirm('Return Home? Entries so far are saved.')) go('home'); };
  document.getElementById('s-back').onclick=prevStep;
  document.getElementById('s-next').onclick=()=>{
    const n=VF_ORDER.map(c=>rec.byColour[c]).filter(v=>v!=null).length;
    if(n<N_GROUPS){ showToast(`Enter all ${N_GROUPS} groups first`); return; }
    nextStep();
  };
  document.getElementById('s-issue').onclick=()=>go('issueMenu');
  function bindRows(){
    app.querySelectorAll('.vf-val').forEach(el=>{
      el.onclick=()=>openKeypad(el.dataset.c, rec.byColour[el.dataset.c], (val)=>{
        if(val===null) delete rec.byColour[el.dataset.c]; else rec.byColour[el.dataset.c]=val;
        document.getElementById('vf-list').innerHTML=rowsHtml(); bindRows(); recompute();
      });

function openKeypad(colour, current, cb){
  let buf = (current!=null)?String(current):'';
  const ov=document.createElement('div'); ov.className='keypad-overlay';
  ov.innerHTML=`
    <div class="keypad-sheet">
      <div style="text-align:center;font-size:16px;margin-bottom:4px;">${colour} group total payoff ΣF</div>
      <div class="keypad-display" id="kd">${buf||'0'}</div>
      <div class="keypad-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-k="${n}">${n}</button>`).join('')}
        <button data-k="clear">C</button>
        <button data-k="0">0</button>
        <button data-k="back">⌫</button>
      </div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn outline" id="k-cancel">Cancel</button>
        <button class="btn primary" id="k-ok">OK</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const disp=ov.querySelector('#kd');

    if(buf.length>1) buf=String(parseInt(buf,10)); // strip leading zeros
    disp.textContent=buf||'0';

/* generic stopwatch used by the Issue sub-screens (counts up).
   Pass fromTs to continue an already-running clock instead of resetting. */
let segTimer=null, segStartTs=null;
function startSegTimer(elId, fromTs){
  segStartTs = fromTs || Date.now();
  if(segTimer) clearInterval(segTimer);
  const el=document.getElementById(elId);
  function upd(){ const sec=Math.max(0,Math.floor((Date.now()-segStartTs)/1000)); if(el) el.textContent=fmtMMSS(sec); }
  upd(); segTimer=setInterval(upd,1000);
}
function stopSegTimer(){ if(segTimer){ clearInterval(segTimer); segTimer=null; } const d = segStartTs? Math.round((Date.now()-segStartTs)/1000):0; segStartTs=null; return d; }
function ctxSessionRound(){ const st=curStep(); return { session: st?st.session:null, round: st?st.round:null }; }
function blockCode(round){ return round==null ? '' : (round<=10 ? 0 : 1); }      // 0 = silent R1-10, 1 = comm R11-20
function treatmentChief(session){ return session===2 ? 1 : 0; }                   // 0 = no chief (S1), 1 = chief (S2)
function pad2(v){ const s=String(v==null?'':v).trim(); return s===''?'':s.padStart(2,'0'); }
function runCode(){ return pad2((STATE.setup&&STATE.setup.run)||'1'); }            // village's experiment run (01, 02, …)

/* ---------- CHIEF TRACKING (page 14) ----------
   The current-segment stopwatch starts the moment you enter this screen and
   keeps running; tapping a target marks a new segment boundary (it does NOT
   reset the stopwatch). Switching target closes the previous segment and opens
   a new one; Save & Back closes the open segment. Segments feed the chief CSV. */
let chiefScreenStartTs=null;
let chiefTarget=null, chiefSegStartTs=null, chiefSegStartOffset=null, chiefSegNo=0, chiefNote='';
function openChiefSegment(target){
  closeChiefSegment(); // close any open one first
  chiefTarget=target;
  chiefSegStartTs=Date.now();
  chiefSegStartOffset = STATE.roundStartTs? Math.max(0, Math.round((Date.now()-STATE.roundStartTs)/1000)) : null;
}
function closeChiefSegment(){
  if(chiefTarget==null||chiefSegStartTs==null) return;
  const end=Date.now();
  const dur=Math.round((end-chiefSegStartTs)/1000);
  const c=ctxSessionRound();
  chiefSegNo++;
  STATE.chiefSegments.push({
    village:STATE.setup.villageNumber, session:c.session, round:c.round, block:blockCode(c.round),
    treatment_chief:treatmentChief(c.session), segment_no:chiefSegNo, target:chiefTarget,
    start_sec_from_round_start: chiefSegStartOffset,
    end_sec_from_round_start: (chiefSegStartOffset!=null? chiefSegStartOffset+dur : null),
    start_ts:new Date(chiefSegStartTs).toISOString(), end_ts:new Date(end).toISOString(),
    duration_sec:dur, quick_note:chiefNote
  });
  saveState();
  chiefTarget=null; chiefSegStartTs=null; chiefSegStartOffset=null; chiefNote='';
}
function renderChiefTrack(app){
  app.innerHTML = `
    <div class="header"><span class="title">🎙 Chief Tracking</span></div>
    <div class="content">
      <p style="text-align:center;margin:0 0 6px;">Chief is currently at:</p>
      <div id="t-walk" class="list-card" data-t="Walking"><span class="ic">🚶</span> Walking / between</div>

      <div class="seg-timer">Current segment: <span class="big" id="seg" style="font-size:24px;">00:00</span><br>
        <span id="cur" class="muted">Not tracking yet — tap where the chief is</span></div>
      <button class="btn primary" id="save">Save &amp; Back</button>
    </div>`;
  const noteEl=document.getElementById('note');
  noteEl.oninput=()=>{ chiefNote=noteEl.value; };
  function refreshSel(){
    app.querySelectorAll('[data-t]').forEach(el=>{
      const on = el.dataset.t===chiefTarget;
      if(el.classList.contains('list-card')) el.style.background = on?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.22)';
      else el.style.borderColor = on?'#fff':'transparent';
    });
    document.getElementById('cur').textContent = chiefTarget? `Tracking: ${chiefTarget}` : 'Not tracking yet — tap where the chief is';
  }
  function selectTarget(t){ openChiefSegment(t); refreshSel(); }   // does NOT reset the stopwatch
  app.querySelectorAll('[data-t]').forEach(el=> el.onclick=()=>selectTarget(el.dataset.t));
  document.getElementById('save').onclick=()=>{ closeChiefSegment(); if(segTimer){clearInterval(segTimer);segTimer=null;} go('issueMenu'); };
  // start the continuous stopwatch on entry (resume if a segment was already open)
  chiefScreenStartTs = chiefSegStartTs || Date.now();
  startSegTimer('seg', chiefScreenStartTs);
  refreshSel();
}

  });
  const totCells=HIST_ORDER.map(c=>`<td>${colTot[c]}</td>`).join('');
  body+=`<tr><td>Total</td>${totCells}<td>${gTot}</td><td>${vfTot}</td></tr>`;
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">🏠</button><span class="title">Session ${session} · Round ${block==='A'?'1-10':'11-20'}</span></div>
    <div class="content">
      <div class="scroll-hint">⇆ scroll left/right · ↕ up/down · values = each group's ΣF; VF = ⌈10%×total⌉</div>
      <div class="table-wrap">
        <table class="grid">
          <thead><tr><th>Round</th>${HIST_ORDER.map(c=>`<th>${c.toLowerCase()}</th>`).join('')}<th>total</th><th>VF</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      <div class="btn-row">
        <button class="btn outline" id="back2">← Back</button>
        <button class="btn outline" id="home2">🏠 Home</button>
      </div>
    </div>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('back2').onclick=()=>go('history');
  document.getElementById('home2').onclick=()=>go('home');
}

/* =============================================================================
   EXPORT TO CSV — three offline downloads (summary, chief segments, VF rounds)
============================================================================= */
function csvCell(v){ return v==null?'':String(v).replace(/[",\n]/g,' '); }
function download(name, csv){
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },1000);
}
function durMin(ms){ return ms? Math.round(ms/60000*100)/100 : ''; }
function buildSummaryCSV(){
  const s=STATE.setup; const run=runCode();
  const header=['village_number','run','village_name','village_type','session','date','start_time','end_time','duration_min','treatment_chief','chief_id','chief_total_speech_sec','village_fund_total_token','village_fund_total_zar','seeds_purchased','n_events_logged','session_notes'];
  let out=header.join(',')+'\n';
  for(const sess of [1,2]){
    const meta=STATE.sessionMeta[sess]||{};
    const start=meta.startTs?new Date(meta.startTs).toISOString():'';
    const end=meta.endTs?new Date(meta.endTs).toISOString():'';
    const dur=(meta.startTs&&meta.endTs)?durMin(meta.endTs-meta.startTs):'';
    const treat = treatmentChief(sess);          // 0 = no chief (S1), 1 = chief (S2)
    const chiefSpeech = sess===2 ? STATE.chiefSegments.filter(x=>x.session===2 && x.target!=='Walking').reduce((a,b)=>a+(b.duration_sec||0),0) : 0;
    const vfTokens = Object.values(STATE.vf[sess]||{}).reduce((a,b)=>a+(b.vf||0),0);
    const vfZar = Math.ceil(vfTokens/TOKENS_PER_ZAR);
    const nEvents = STATE.events.filter(e=>e.session===sess).length;
    const row=[ s.villageNumber, run, s.villageName, s.villageType, sess, s.date, start, end, dur,
      treat, sess===2?(s.chiefName||''):'', sess===2?chiefSpeech:'', vfTokens, vfZar,
      STATE.seedsPurchased, nEvents, STATE.sessionNotes ].map(csvCell).join(',');
    out+=row+'\n';
  }
  return out;
}
function buildChiefCSV(){
  const s=STATE.setup; const run=runCode();
  const header=['village','run','session','treatment_chief','round','block','segment_no','target','start_sec_from_round_start','end_sec_from_round_start','duration_sec','quick_note'];
  let out=header.join(',')+'\n';
  STATE.chiefSegments.forEach(x=>{
    out+=[ s.villageNumber, run, x.session, (x.treatment_chief!=null?x.treatment_chief:treatmentChief(x.session)), x.round, (x.block!=null?x.block:blockCode(x.round)),
      x.segment_no, x.target, x.start_sec_from_round_start, x.end_sec_from_round_start, x.duration_sec, x.quick_note ].map(csvCell).join(',')+'\n';
  });
  return out;
}
function buildVfCSV(){
  const s=STATE.setup; const run=runCode();
  const header=['village','run','session','treatment_chief','round','block', ...VF_ORDER.map(c=>'payoff_'+c), 'round_total_payoff','round_vf_token','cumulative_vf_token'];
  let out=header.join(',')+'\n'; let cum=0;
  for(const sess of [1,2]){
    const rounds=Object.keys(STATE.vf[sess]||{}).map(Number).sort((a,b)=>a-b);
    rounds.forEach(rn=>{
      const rec=STATE.vf[sess][rn]; cum+=rec.vf||0;
      out+=[ s.villageNumber, run, sess, treatmentChief(sess), rn, blockCode(rn), ...VF_ORDER.map(c=>rec.byColour[c]!=null?rec.byColour[c]:''), rec.total, rec.vf, cum ].map(csvCell).join(',')+'\n';
    });
  }
  return out;
}
function buildEventsCSV(){   // all Issue/Problem + Participant-left logs
  const s=STATE.setup; const run=runCode();
  const header=['village','run','session','treatment_chief','round','block','segment_no','type','participant_id','note','duration_sec','timestamp'];
  let out=header.join(',')+'\n';
  STATE.events.forEach(e=>{
    const vil = (e.village!=null?e.village:s.villageNumber);
    // CSV participant_id is four-part: {village}_{run}_{colour_code}_{member}, e.g. 01_01_05_02
    // (e.id is the two-part {colour_code}_{member} shown in the UI, e.g. 05_02)
    const pid = e.id ? `${pad2(vil)}_${run}_${e.id}` : '';
    out+=[ vil, run, e.session, (e.treatment_chief!=null?e.treatment_chief:treatmentChief(e.session)),
      e.round, (e.block!=null?e.block:blockCode(e.round)), e.segment_no, e.type, pid, e.note||'', e.duration_sec, e.ts ].map(csvCell).join(',')+'\n';
  });
  return out;
}
function buildMaterialCSV(){  // End-Experiment material checklist
  const s=STATE.setup; const run=runCode();
  const header=['village','run','date','item_id','is_subitem','checked','item_text'];
  let out=header.join(',')+'\n';
  MATERIAL_ITEMS.forEach(it=>{
    out+=[ s.villageNumber, run, s.date, it.id, it.sub?1:0, STATE.material[it.id]?1:0, it.t ].map(csvCell).join(',')+'\n';
  });
  return out;
}
function buildCashCSV(){      // cash reconciliation (key/value, robust)
  const s=STATE.setup; const c=STATE.cash; const run=runCode();
  const header=['village','run','date','field','value'];
  let out=header.join(',')+'\n';
  const push=(f,v)=>{ out+=[ s.villageNumber, run, s.date, f, v ].map(csvCell).join(',')+'\n'; };
  c.denoms.forEach((d,i)=>{
    const tag=(d.label||('denom_'+(i+1))).replace(/[^A-Za-z0-9]+/g,'_');
    push(tag+'__face_zar', d.face);
    push(tag+'__brought', d.brought);
    push(tag+'__remaining', d.remain);
  });
  push('starting_zar', c.starting);
  push('paid_out_zar', c.paidOut);
  push('remaining_zar', c.remaining);
  return out;
}
function buildOthersCSV(){     // Others (items + seeds + notes)
  const s=STATE.setup; const run=runCode();
  const header=['village','run','date','row_type','item','quantity'];
  let out=header.join(',')+'\n';
  STATE.others.filter(r=>r.item||r.qty).forEach(r=>{
    out+=[ s.villageNumber, run, s.date, 'item', r.item, r.qty ].map(csvCell).join(',')+'\n';
  });
  out+=[ s.villageNumber, run, s.date, 'seeds_purchased', '', STATE.seedsPurchased ].map(csvCell).join(',')+'\n';
  out+=[ s.villageNumber, run, s.date, 'session_notes', STATE.sessionNotes, '' ].map(csvCell).join(',')+'\n';
  return out;
}
function buildReceiptCSV(){    // receipt cross-check (key/value)
  const s=STATE.setup; const r=STATE.receipt; const run=runCode();
  const header=['village','run','date','field','value'];
  let out=header.join(',')+'\n';
  const push=(f,v)=>{ out+=[ s.villageNumber, run, s.date, f, v ].map(csvCell).join(',')+'\n'; };
  const num=v=>{ const n=parseFloat(v); return isNaN(n)?null:n; };
  push('sum_receipts_zar', r.sumReceipts);
  push('offline_app_total_zar', r.offlineTotal);
  push('match', (num(r.sumReceipts)!=null && num(r.sumReceipts)===num(r.offlineTotal))?1:0);
  push('village_fund_total_token', r.vfTokens);
  push('village_fund_total_zar', r.vfZar);
  return out;
}
function renderExport(app){
  const fnBase=`MOD_${STATE.setup.villageNumber}_${STATE.setup.date}`;
  app.innerHTML=`
    <div class="header"><button class="home-btn" id="back">🏠</button><span class="title">Export Data</span></div>
    <div class="content">
      <p>Download CSV files (works fully offline):</p>
      <button class="btn primary" id="dl-all">📥 Download all CSVs</button>
      <hr class="divider">
      <button class="btn" id="dl-sum">Session summary</button>
      <button class="btn" id="dl-vf">Village fund by round</button>
      <button class="btn" id="dl-chief">Chief segments</button>
      <button class="btn" id="dl-evt">Issue / participant-left log</button>
      <button class="btn" id="dl-mat">End-Exp · Material checklist</button>
      <button class="btn" id="dl-rec">End-Exp · Receipt cross-check</button>
      <button class="btn" id="dl-cash">End-Exp · Cash reconciliation</button>
      <button class="btn" id="dl-oth">End-Exp · Others</button>
      <button class="btn outline" id="copy-sum">📋 Copy summary to clipboard</button>
      <div id="prev" style="margin-top:12px;max-height:38vh;overflow:auto;background:rgba(255,255,255,0.1);padding:8px;border-radius:8px;font-family:monospace;font-size:11px;white-space:pre;"></div>
    </div>`;
  document.getElementById('back').onclick=()=>go('home');
  const files={
    summary:buildSummaryCSV(), villagefund:buildVfCSV(), chief_segments:buildChiefCSV(),
    issue_log:buildEventsCSV(), material:buildMaterialCSV(), receipt:buildReceiptCSV(),
    cash:buildCashCSV(), others:buildOthersCSV()
  };
  document.getElementById('prev').textContent='— Session summary —\n'+files.summary+'\n— Village fund —\n'+files.villagefund;
  const dl=(key)=>download(`${fnBase}_${key}.csv`, files[key]);
  document.getElementById('dl-sum').onclick=()=>dl('summary');
  document.getElementById('dl-vf').onclick=()=>dl('villagefund');
  document.getElementById('dl-chief').onclick=()=>dl('chief_segments');
  document.getElementById('dl-evt').onclick=()=>dl('issue_log');
  document.getElementById('dl-mat').onclick=()=>dl('material');
  document.getElementById('dl-rec').onclick=()=>dl('receipt');
  document.getElementById('dl-cash').onclick=()=>dl('cash');
  document.getElementById('dl-oth').onclick=()=>dl('others');
  document.getElementById('dl-all').onclick=()=>{ Object.keys(files).forEach((k,i)=> setTimeout(()=>dl(k), i*350)); showToast('Downloading all CSVs…'); };
  document.getElementById('copy-sum').onclick=async()=>{ try{ await navigator.clipboard.writeText(files.summary); showToast('Copied'); }catch(e){ showToast('Clipboard unavailable — use Download'); } };
}

/* =============================================================================
   STARTUP + back-button / reload guards (mirrors Facilitator app)
============================================================================= */
window.addEventListener('load', () => {
  try { history.replaceState({route,routeArgs,pgg:true},'',''); } catch(e){}
  render();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
});

/* Hardware/browser back: block during the experiment so nothing is lost. */
window.addEventListener('popstate', () => {
  if(isMidExperiment() && route==='step'){
    try { history.pushState({route,routeArgs,pgg:true},'',''); } catch(e){}
    showToast('Use the on-screen Back / Next during the experiment.');
  }
});
/* Block accidental refresh / close mid-experiment. */
window.addEventListener('beforeunload', (e) => {
  if(isMidExperiment()){ e.preventDefault(); e.returnValue=''; }
});
</script>
